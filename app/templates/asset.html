<!DOCTYPE html>
<html>

<head>

    <title>Asset Details</title>

    <style>

        body{
            font-family:Arial;
            margin:40px;
            background:#f5f5f5;
        }

        table{
            border-collapse:collapse;
            width:700px;
            background:white;
        }

        td{
            border:1px solid #ccc;
            padding:10px;
        }

        td:first-child{
            width:40%;
            font-weight:bold;
            background:#efefef;
        }

        h2{
            margin-bottom:20px;
        }

    </style>

</head>

<body>

<h2>Learner Details</h2>

<table>

{% for key,value in asset.items() %}

<tr>

<td>{{key}}</td>

<td>{{value}}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
